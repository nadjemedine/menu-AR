<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR Sushi</title>
    <!-- Use A-Frame 1.2.0 as it's stable with AR.js -->
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
</head>
<body style="margin: 0; overflow: hidden;">
    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;">
        
        <a-assets>
            <a-asset-item id="sushi" src="sushi.glb"></a-asset-item>
        </a-assets>

        <!-- Marker: hiro -->
        <a-marker preset="hiro">
            <!-- 3D Model: scale adjusted to 1 1 1 for better visibility -->
            <a-entity
                gltf-model="#sushi"
                scale="1 1 1"
                position="0 0.5 0"
                rotation="0 0 0"
                animation="property: rotation; to: 0 360 0; loop: true; dur: 8000; easing: linear">
            </a-entity>
        </a-marker>

        <!-- Essential Lighting -->
        <a-entity light="type: ambient; color: #FFF; intensity: 0.8"></a-entity>
        <a-entity light="type: directional; color: #FFF; intensity: 0.6" position="-1 2 1"></a-entity>

        <a-entity camera></a-entity>
    </a-scene>
</body>
</html>
