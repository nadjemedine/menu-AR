<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Menu-AR: Fix Camera Zoom</title>
    <!-- نسخ مستقرة من A-Frame و AR.js -->
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <!-- مكتبة التحكم بالإيماءات (Gestures) للزووم والتدوير -->
    <script src="https://raw.githack.com/fcor/aframe-gesture-handler/master/dist/aframe-gesture-handler.js"></script>
</head>
<body style="margin: 0; overflow: hidden;">
    
    <!-- ضبط إعدادات AR.js لتحسين الدقة ومنع الزووم -->
    <!-- تم ضبط sourceWidth و sourceHeight لتطابق displayWidth و displayHeight لتجنب التكبير (Zoom) -->
    <a-scene 
        embedded 
        arjs="sourceType: webcam; debugUIEnabled: false; displayWidth: 1280; displayHeight: 720; sourceWidth: 1280; sourceHeight: 720;"
        renderer="logarithmicDepthBuffer: true; antialias: true;"
        vr-mode-ui="enabled: false"
        gesture-detector>
        
        <a-assets>
            <!-- تحميل ملف السوشي -->
            <a-asset-item id="sushi-model" src="sushi.glb"></a-asset-item>
        </a-assets>

        <!-- علامة Hiro الافتراضية مع السماح بالتفاعل (cursors) -->
        <a-marker preset="hiro" cursor="rayOrigin: mouse" raycaster="objects: .clickable">
            <!-- عرض المجسم مع إتاحة التحكم اليدوي به عبر الإيماءات -->
            <a-entity
                id="sushi"
                gltf-model="#sushi-model"
                class="clickable"
                gesture-handler
                scale="0.3 0.3 0.3" 
                position="0 0.1 0"
                rotation="0 0 0">
            </a-entity>
        </a-marker>

        <!-- إضاءة محسنة لرؤية الموديل بشكل طبيعي -->
        <a-entity light="type: ambient; color: #FFF; intensity: 1"></a-entity>
        <a-entity light="type: directional; color: #FFF; intensity: 1" position="0.5 4 2"></a-entity>

        <!-- الكاميرا مع زاوية رؤية أوسع (FOV=80) لتقليل الزووم -->
        <a-entity camera fov="80"></a-entity>
        
    </a-scene>
</body>
</html>
